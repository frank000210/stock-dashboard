<script>
// 芒聰聙芒聰聙芒聰聙 Chart defaults 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
Chart.defaults.color = '#8b949e';
Chart.defaults.borderColor = '#30363d';
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";

let revenueChart, instChart, epsChart, klineChart, klineRawData;

const activeIndicators = {
  ma5: true, ma10: true, ma20: true, ma60: false,
  bb: false,
  vol: true, macd: true, kd: true, rsi: false
};

function destroyChart(chart) { if (chart) chart.destroy(); }

function fmt(n) {
  if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(1) + '氓聞聞';
  if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(0) + '猫聬卢';
  return n.toLocaleString();
}
function fmtM(n) {
  if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(2) + '氓聞聞';
  return (n / 1e4).toFixed(0) + '猫聬卢';
}
function colorSign(n) {
  return n > 0 ? '<span class="pos">芒聳虏' + fmtM(n) + '</span>'
               : n < 0 ? '<span class="neg">芒聳录' + fmtM(Math.abs(n)) + '</span>'
               : '芒聙聯';
}

// 芒聰聙芒聰聙芒聰聙 Indicator math 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function calcMA(data, period) {
  return data.map((_, i) => {
    if (i < period - 1) return null;
    const sum = data.slice(i - period + 1, i + 1).reduce((a, b) => a + b, 0);
    return +(sum / period).toFixed(2);
  });
}

function calcEMA(data, period) {
  const k = 2 / (period + 1);
  const result = [];
  let ema = null, cnt = 0;
  for (let i = 0; i < data.length; i++) {
    if (ema === null) {
      cnt++;
      if (cnt < period) { result.push(null); continue; }
      ema = data.slice(0, period).reduce((a, b) => a + b, 0) / period;
      result.push(+ema.toFixed(3));
    } else {
      ema = data[i] * k + ema * (1 - k);
      result.push(+ema.toFixed(3));
    }
  }
  return result;
}

function calcMACD(closes, fast = 12, slow = 26, signal = 9) {
  const emaFast = calcEMA(closes, fast);
  const emaSlow = calcEMA(closes, slow);
  const macdLine = emaFast.map((f, i) => (f !== null && emaSlow[i] !== null) ? +(f - emaSlow[i]).toFixed(3) : null);
  const firstValid = macdLine.findIndex(v => v !== null);
  const sigArr = new Array(firstValid).fill(null);
  let sigEma = null, cnt = 0;
  for (let i = firstValid; i < macdLine.length; i++) {
    if (sigEma === null) {
      cnt++;
      if (cnt < signal) { sigArr.push(null); continue; }
      sigEma = macdLine.slice(firstValid, firstValid + signal).reduce((a, b) => a + b, 0) / signal;
      sigArr.push(+sigEma.toFixed(3));
    } else {
      sigEma = macdLine[i] * (2 / (signal + 1)) + sigEma * (1 - 2 / (signal + 1));
      sigArr.push(+sigEma.toFixed(3));
    }
  }
  const hist = macdLine.map((m, i) => (m !== null && sigArr[i] !== null) ? +(m - sigArr[i]).toFixed(3) : null);
  return { macd: macdLine, signal: sigArr, hist };
}

function calcKD(highs, lows, closes, n = 9, mK = 3, mD = 3) {
  const kArr = [], dArr = [];
  let k = 50, d = 50;
  for (let i = 0; i < closes.length; i++) {
    if (i < n - 1) { kArr.push(null); dArr.push(null); continue; }
    const hn = Math.max(...highs.slice(i - n + 1, i + 1));
    const ln = Math.min(...lows.slice(i - n + 1, i + 1));
    const rsv = hn === ln ? 50 : (closes[i] - ln) / (hn - ln) * 100;
    k = (k * (mK - 1) + rsv) / mK;
    d = (d * (mD - 1) + k) / mD;
    kArr.push(+k.toFixed(2));
    dArr.push(+d.toFixed(2));
  }
  return { k: kArr, d: dArr };
}

function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return closes.map(() => null);
  const result = new Array(period).fill(null);
  let avgGain = 0, avgLoss = 0;
  for (let i = 1; i <= period; i++) {
    const ch = closes[i] - closes[i - 1];
    if (ch > 0) avgGain += ch; else avgLoss += Math.abs(ch);
  }
  avgGain /= period; avgLoss /= period;
  const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
  result.push(+(100 - 100 / (1 + rs)).toFixed(2));
  for (let i = period + 1; i < closes.length; i++) {
    const ch = closes[i] - closes[i - 1];
    avgGain = (avgGain * (period - 1) + (ch > 0 ? ch : 0)) / period;
    avgLoss = (avgLoss * (period - 1) + (ch < 0 ? Math.abs(ch) : 0)) / period;
    const rs2 = avgLoss === 0 ? 100 : avgGain / avgLoss;
    result.push(+(100 - 100 / (1 + rs2)).toFixed(2));
  }
  return result;
}

function calcBB(closes, period = 20, mult = 2) {
  const upper = [], middle = [], lower = [];
  for (let i = 0; i < closes.length; i++) {
    if (i < period - 1) { upper.push(null); middle.push(null); lower.push(null); continue; }
    const sl = closes.slice(i - period + 1, i + 1);
    const mean = sl.reduce((a, b) => a + b, 0) / period;
    const std = Math.sqrt(sl.reduce((s, v) => s + (v - mean) ** 2, 0) / period);
    upper.push(+(mean + mult * std).toFixed(2));
    middle.push(+mean.toFixed(2));
    lower.push(+(mean - mult * std).toFixed(2));
  }
  return { upper, middle, lower };
}

// 芒聰聙芒聰聙芒聰聙 K-Line Chart 芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙芒聰聙
function getSubPanels() {
  const panels = [];
  if (activeIndicators.vol)  panels.push('vol');
  if (activeIndicators.macd) panels.push('macd');
  if (activeIndicators.kd)   panels.push('kd');
  if (activeIndicators.rsi)  panels.push('rsi');
  return panels;
}

function computeChartLayout(nSub) {
  const mainH   = nSub === 0 ? 320 : nSub === 1 ? 290 : nSub === 2 ? 270 : nSub === 3 ? 250 : 230;
  const subH    = 85;
  const topPad  = 36;
  const gap     = 8;
  const dzH     = 40;
  const totalH  = topPad + mainH + (nSub > 0 ? gap + nSub * (subH + gap) : 0) + dzH + 10;

  const grids = [];
  let top = topPad;
  grids.push({ top, height: mainH, left: 68, right: 14 });
  top += mainH + gap;
  for (let i = 0; i < nSub; i++) {
    grids.push({ top, height: subH, left: 68, right: 14 });
    top += subH + gap;
  }
  return { grids, totalH, dzBottom: 8 };
}

function buildKlineOption(data) {
  const dates  = data.map(d => d.date);
  const opens  = data.map(d => d.open);
  const highs  = data.map(d => d.high);
  const lows   = data.map(d => d.low);
  const closes = data.map(d => d.close);
  const vols   = data.map(d => d.volume);

  const ma5  = calcMA(closes, 5);
  const ma10 = calcMA(closes, 10);
  const ma20 = calcMA(closes, 20);
  const ma60 = calcMA(closes, 60);
  const bb   = calcBB(closes, 20, 2);
  const macdRes = calcMACD(closes, 12, 26, 9);
  const kdRes   = calcKD(highs, lows, closes, 9, 3, 3);
  const rsiRes  = calcRSI(closes, 14);

  const subPanels = getSubPanels();
  const nSub = subPanels.length;
  const { grids, totalH, dzBottom } = computeChartLayout(nSub);

  document.getElementById('klineChart').style.height = totalH + 'px';

  const xAxes = grids.map((_, i) => ({
    type: 'category', data: dates, gridIndex: i,
    axisLabel: { show: i === grids.length - 1, fontSize: 10, color: '#8b949e' },
    axisLine: { lineStyle: { color: '#30363d' } },
    splitLine: { show: false }, axisTick: { show: false },
  }));

  const subNames = { vol: '茅聡聫', macd: 'MACD', kd: 'KD', rsi: 'RSI' };
  const yAxes = grids.map((_, i) => ({
    type: 'value', gridIndex: i, scale: i === 0,
    name: i === 0 ? '' : subNames[subPanels[i - 1]],
    nameTextStyle: { color: '#8b949e', fontSize: 10 },
    min: (i > 0 && subPanels[i - 1] === 'rsi') ? 0 : undefined,
    max: (i > 0 && subPanels[i - 1] === 'rsi') ? 100 : undefined,
    axisLabel: { fontSize: 10, color: '#8b949e', formatter: v => {
      if (i > 0 && subPanels[i - 1] === 'vol') return Math.abs(v) >= 1e8 ? (v/1e8).toFixed(0)+'氓聞聞' : (v/1e4).toFixed(0)+'猫聬卢';
      return v;
    }},
    splitLine: { lineStyle: { color: '#21262d' } },
    axisLine: { show: false }, axisTick: { show: false },
  }));

  const series = [];

  // Candlestick: [open, close, low, high]
  series.push({
    type: 'candlestick', name: 'K莽路職', xAxisIndex: 0, yAxisIndex: 0,
    data: closes.map((_, i) => [opens[i], closes[i], lows[i], highs[i]]),
    itemStyle: { color: '#f85149', color0: '#3fb950', borderColor: '#f85149', borderColor0: '#3fb950' },
  });

  // MA lines on main
  const maMap = { ma5: [ma5, '#ffd60a'], ma10: [ma10, '#ff9800'], ma20: [ma20, '#58a6ff'], ma60: [ma60, '#9f7be1'] };
  for (const [key, [vals, color]] of Object.entries(maMap)) {
    if (activeIndicators[key]) {
      series.push({
        type: 'line', name: key.toUpperCase(), xAxisIndex: 0, yAxisIndex: 0, data: vals,
        lineStyle: { color, width: 1.2 }, showSymbol: false,
      });
    }
  }

  // Bollinger Bands
  if (activeIndicators.bb) {
    const bbStyle = { showSymbol: false, xAxisIndex: 0, yAxisIndex: 0 };
    series.push({ type: 'line', name: 'BB盲赂聤', data: bb.upper, lineStyle: { color: '#c9a227', width: 1, type: 'dashed' }, ...bbStyle });
    series.push({ type: 'line', name: 'BB盲赂颅', data: bb.middle, lineStyle: { color: '#888', width: 1 }, ...bbStyle });
    series.push({ type: 'line', name: 'BB盲赂聥', data: bb.lower, lineStyle: { color: '#c9a227', width: 1, type: 'dashed' }, ...bbStyle });
  }

  // Sub-panels
  subPanels.forEach((panel, pi) => {
    const gi = pi + 1;
    if (panel === 'vol') {
      series.push({
        type: 'bar', name: '忙聢聬盲潞陇茅聡聫', xAxisIndex: gi, yAxisIndex: gi, barMaxWidth: 8,
        data: vols.map((v, i) => ({ value: v, itemStyle: { color: closes[i] >= opens[i] ? 'rgba(248,81,73,.65)' : 'rgba(63,185,80,.65)' } })),
      });
    } else if (panel === 'macd') {
      series.push(
        { type: 'bar', name: 'MACD忙聼卤', xAxisIndex: gi, yAxisIndex: gi, barMaxWidth: 8,
          data: macdRes.hist.map(v => ({ value: v, itemStyle: { color: (v||0) >= 0 ? '#f85149' : '#3fb950' } })) },
        { type: 'line', name: 'DIF', xAxisIndex: gi, yAxisIndex: gi, data: macdRes.macd, lineStyle: { color: '#58a6ff', width: 1.2 }, showSymbol: false },
        { type: 'line', name: 'DEA', xAxisIndex: gi, yAxisIndex: gi, data: macdRes.signal, lineStyle: { color: '#ff9800', width: 1.2 }, showSymbol: false }
      );
    } else if (panel === 'kd') {
      series.push(
        { type: 'line', name: 'K', xAxisIndex: gi, yAxisIndex: gi, data: kdRes.k, lineStyle: { color: '#ffd60a', width: 1.2 }, showSymbol: false },
        { type: 'line', name: 'D', xAxisIndex: gi, yAxisIndex: gi, data: kdRes.d, lineStyle: { color: '#ff9800', width: 1.2 }, showSymbol: false }
      );
    } else if (panel === 'rsi') {
      series.push({
        type: 'line', name: 'RSI', xAxisIndex: gi, yAxisIndex: gi, data: rsiRes,
        lineStyle: { color: '#9f7be1', width: 1.5 }, showSymbol: false,
        markLine: {
          silent: true,
          data: [{ yAxis: 70, name: '猫露聟猫虏路' }, { yAxis: 30, name: '猫露聟猫鲁拢' }],
          lineStyle: { color: '#555', type: 'dashed', width: 1 },
          label: { fontSize: 10, color: '#555' },
        },
      });
    }
  });

  return {
    backgroundColor: 'transparent',
    animation: false,
    grid: grids,
    xAxis: xAxes,
    yAxis: yAxes,
    dataZoom: [
      { type: 'inside', xAxisIndex: grids.map((_, i) => i), start: 40, end: 100 },
      { type: 'slider', xAxisIndex: grids.map((_, i) => i), show: true,
        bottom: dzBottom, height: 24,
        borderColor: '#30363d', backgroundColor: '#161b22',
        fillerColor: 'rgba(88,166,255,0.1)',
        handleStyle: { color: '#58a6ff' },
        textStyle: { color: '#8b949e', fontSize: 10 },
        start: 40, end: 100 },
    ],
    tooltip: {
      trigger: 'axis', axisPointer: { type: 'cross', crossStyle: { color: '#444' } },
      backgroundColor: '#1c2128', borderColor: '#30363d',
      textStyle: { color: '#c9d1d9', fontSize: 11 },
    },
    legend: {
      data: ['MA5','MA10','MA20','MA60','BB盲赂聤','BB盲赂颅','BB盲赂聥','DIF','DEA','K','D','RSI'],
      textStyle: { color: '#8b949e', fontSize: 10 }, top: 4, right: 14, itemWidth: 16,
    },
    series,
  };
}

    const ctx = document.getElementById('revenueChart').getContext('2d');

      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '忙聹聢莽聡聼忙聰露',
          data: values,
          backgroundColor: values.map((_, i) => i === values.length - 1 ? 'rgba(88,166,255,.9)' : 'rgba(88,166,255,.45)'),
          borderRadius: 4, borderSkipped: false,

      },
      options: {

          x: { grid: { display: false } },
          y: { grid: { color: '#21262d' }, ticks: { callback: v => fmtM(v) } }

function loadAll() {
  const stockId = document.getElementById('stockInput').value.trim();
  if (!stockId) return;
  // Update URL without reload
  const url = new URL(window.location);
  url.searchParams.set('stock', stockId);
  history.replaceState({}, '', url);

  loadKline(stockId);
  loadRevenue(stockId);
  loadInstitutional(stockId);
  loadFinancial(stockId);
}

document.getElementById('stockInput').addEventListener('keydown', e => { if (e.key === 'Enter') loadAll(); });

// Init 芒聙聯 check URL params
(function init() {
  const params = new URLSearchParams(window.location.search);
  const s = params.get('stock');
  if (s) document.getElementById('stockInput').value = s;
  loadMarket();
  loadAll();
})();
</script>
